<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Web Translator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 400px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    
    h1 {
      font-size: 20px;
      margin-bottom: 20px;
      text-align: center;
    }
    
    .section {
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 15px;
    }
    
    .section h2 {
      font-size: 14px;
      margin-bottom: 10px;
      opacity: 0.9;
    }
    
    label {
      display: block;
      margin-bottom: 5px;
      font-size: 12px;
      opacity: 0.8;
    }
    
    select, input, textarea {
      width: 100%;
      padding: 8px 12px;
      border: none;
      border-radius: 5px;
      background: rgba(255,255,255,0.9);
      color: #333;
      font-size: 13px;
      margin-bottom: 10px;
    }
    
    textarea {
      min-height: 60px;
      resize: vertical;
    }
    
    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 5px;
      background: white;
      color: #667eea;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s;
    }
    
    button:hover {
      transform: scale(1.02);
    }
    
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    
    .status {
      text-align: center;
      font-size: 12px;
      margin-top: 10px;
      opacity: 0.8;
    }
    
    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    
    .toggle-label {
      font-size: 13px;
    }
    
    /* Toggle Switch */
    .switch {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 22px;
    }
    
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(255,255,255,0.3);
      transition: .3s;
      border-radius: 22px;
    }
    
    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 2px;
      bottom: 2px;
      background-color: white;
      transition: .3s;
      border-radius: 50%;
    }
    
    input:checked + .slider {
      background-color: rgba(255,255,255,0.8);
    }
    
    input:checked + .slider:before {
      transform: translateX(18px);
    }
  </style>
</head>
<body>
  <h1>🌐 AI Web Translator</h1>
  
  <div class="section">
    <h2>⚙️ 模型配置</h2>
    <label for="provider">API 提供商</label>
    <select id="provider">
      <option value="openai">OpenAI</option>
      <option value="anthropic">Anthropic (Claude)</option>
      <option value="google">Google (Gemini)</option>
      <option value="azure">Azure OpenAI</option>
      <option value="custom">自定义 API</option>
    </select>
    
    <label for="model">模型</label>
    <select id="model">
      <option value="gpt-4o">GPT-4o</option>
      <option value="gpt-4o-mini">GPT-4o Mini</option>
      <option value="gpt-4-turbo">GPT-4 Turbo</option>
      <option value="claude-3-5-sonnet">Claude 3.5 Sonnet</option>
      <option value="claude-3-opus">Claude 3 Opus</option>
      <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
    </select>
    
    <label for="apiKey">API Key</label>
    <input type="password" id="apiKey" placeholder="输入你的 API Key">
    
    <label for="baseUrl">Base URL (可选)</label>
    <input type="text" id="baseUrl" placeholder="https://api.openai.com/v1">
  </div>
  
  <div class="section">
    <h2>🌍 翻译设置</h2>
    <label for="targetLang">目标语言</label>
    <select id="targetLang">
      <option value="zh-CN">简体中文</option>
      <option value="zh-TW">繁体中文</option>
      <option value="en">英语</option>
      <option value="ja">日语</option>
      <option value="ko">韩语</option>
      <option value="fr">法语</option>
      <option value="de">德语</option>
      <option value="es">西班牙语</option>
      <option value="ru">俄语</option>
    </select>
    
    <div class="toggle-row">
      <span class="toggle-label">自动翻译</span>
      <label class="switch">
        <input type="checkbox" id="autoTranslate">
        <span class="slider"></span>
      </label>
    </div>
    
    <div class="toggle-row">
      <span class="toggle-label">同步滚动</span>
      <label class="switch">
        <input type="checkbox" id="syncScroll" checked>
        <span class="slider"></span>
      </label>
    </div>
    
    <div class="toggle-row">
      <span class="toggle-label">悬浮高亮</span>
      <label class="switch">
        <input type="checkbox" id="hoverHighlight" checked>
        <span class="slider"></span>
      </label>
    </div>
  </div>
  
  <div class="section">
    <h2>🎯 过滤设置</h2>
    <div class="toggle-row">
      <span class="toggle-label">过滤代码块</span>
      <label class="switch">
        <input type="checkbox" id="filterCode" checked>
        <span class="slider"></span>
      </label>
    </div>
    
    <div class="toggle-row">
      <span class="toggle-label">过滤公式</span>
      <label class="switch">
        <input type="checkbox" id="filterMath" checked>
        <span class="slider"></span>
      </label>
    </div>
    
    <div class="toggle-row">
      <span class="toggle-label">过滤导航栏</span>
      <label class="switch">
        <input type="checkbox" id="filterNav" checked>
        <span class="slider"></span>
      </label>
    </div>
  </div>
  
  <button id="saveBtn">💾 保存配置</button>
  <button id="startBtn" style="margin-top: 10px; background: #4CAF50; color: white;">🚀 开始翻译</button>
  
  <div class="status" id="status"></div>
  
  <script src="popup.js"></script>
</body>
</html>
